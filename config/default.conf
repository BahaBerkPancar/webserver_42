server {
    listen 8080;
    host 127.0.0.1;
    root www/html;
    index index.html;

    location /uploads {
        methods GET POST DELETE;
        root www/uploads;
        autoindex on;
    }

    location /cgi-bin {
        root www/cgi-bin;
        cgi_ext .py .php;
    }
}

server {
    listen 9090;
    host 127.0.0.1;
    root www/other;
}