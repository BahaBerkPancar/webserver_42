server {
    listen       8080;
    listen       127.0.0.1:9090;
 
    error_page   404  /errors/404.html;
    error_page   500  /errors/50x.html;
 
    client_max_body_size 10m;
 
    location / {
        root    /var/www/html;
        index   index.html;
        methods GET POST;
    }
 
    location /upload {
        methods     POST;
        root        /var/www;
        upload_store /tmp/uploads;
    }
 
    location /files {
        root      /var/www;
        autoindex on;
        methods   GET;
    }
}
 
server {
    listen 9091;
 
    location / {
        root    /var/www/site2;
        index   index.html;
        methods GET;
    }
}
 
